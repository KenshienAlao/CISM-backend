services:
  backend:
    build: .
    container_name: spring-backend
    tty: true
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: ${DB_ENDPOINT}
      DB_KEY: ${DB_KEY}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
